<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit-icons.min.js"></script>

    <div style="display: flex; align-items: center;">
        <a href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/image/logo-smr-blanco.svg' | relative_url }}" 
                 alt="SMR" 
                 style="height: 50px; width: auto; display: block;">
        </a>
    </div>

<nav style="
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 5px 20px; 
    background: #222; /* El fondo oscuro de tu tema */
    min-height: 60px; /* Aquí controlas el grosor total del menú */
">
    

    <div style="display: flex; align-items: center;">
        {%- for item in include.menu -%}
            {%- assign node = site.pages | where: "name", item.file | first -%}
            {%- assign url = item.url | default: node.url -%}
            {%- assign title = item.title | default: node.title -%}
            
            <a href="{{ url | relative_url }}" 
               style="
                color: white; 
                margin-left: 20px; 
                text-decoration: none; 
                text-transform: uppercase; 
                font-size: 14px;
                display: flex;
                align-items: center;
               ">
                {%- if item.icon -%}
                    <span uk-icon="icon: {{ item.icon }}" style="margin-right: 8px;"></span>
                {%- endif -%}
                {{ title }}
            </a>
        {%- endfor -%}
    </div>

</nav>
