<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit-icons.min.js"></script>

<nav style="display: flex; align-items: center; justify-content: space-between; padding: 0px 20px; min-height: 65px; background: backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;">
    
    <div style="display: flex; align-items: center;">
        <a href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/image/logo-smr-blanco.svg' | relative_url }}" alt="SMR" style="height: 80px; width: auto;">
        </a>
    </div>

    <div class="uk-visible@m" style="display: flex; align-items: center;">
        {%- for item in include.menu -%}
            <a href="{{ item.url | relative_url }}" style="color: white; margin-left: 20px; text-decoration: none; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center;">
                {%- if item.icon -%}<span uk-icon="icon: {{ item.icon }}; ratio: 0.8" style="margin-right: 8px;"></span>{%- endif -%}
                {{ item.title }}
            </a>
        {%- endfor -%}
    </div>

    <a class="uk-hidden@m" uk-toggle="target: #menu-movil" style="color: white; padding: 10px;">
        <span uk-icon="icon: menu; ratio: 1.2"></span>
    </a>
</nav>

<div id="menu-movil" uk-offcanvas="flip: true; overlay: true">
    <div class="uk-offcanvas-bar" style="background: #111; display: flex; flex-column: column;">
        <button class="uk-offcanvas-close" type="button" uk-close></button>
        
        <ul class="uk-nav uk-nav-default uk-margin-large-top">
            <li class="uk-nav-header" style="color: #b59410; letter-spacing: 2px;">MENÚ</li>
            <li class="uk-nav-divider"></li>
            {%- for item in include.menu -%}
            <li>
                <a href="{{ item.url | relative_url }}" style="color: white; font-size: 16px; padding: 15px 0; display: flex; align-items: center;">
                    {%- if item.icon -%}<span uk-icon="icon: {{ item.icon }}" class="uk-margin-right"></span>{%- endif -%}
                    {{ item.title }}
                </a>
            </li>
            {%- endfor -%}
        </ul>
    </div>
</div>
