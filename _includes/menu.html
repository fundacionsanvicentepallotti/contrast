<style>
/* Ajuste del ancho del menú lateral (offcanvas) */
.uk-offcanvas-bar {
    width: 200px !important; /* Puedes cambiar 200px por el ancho que prefieras */
}

/* Asegurar que el menú se desplace correctamente desde fuera de la pantalla */
.uk-offcanvas-flip .uk-offcanvas-bar {
    right: -200px;
}

:not(.uk-offcanvas-flip) > .uk-offcanvas-bar {
    left: -200px;
}

/* Ajuste de los textos dentro del menú móvil */
.uk-offcanvas-bar .uk-nav-default > li > a {
    font-size: 0.85rem;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 1px;
}
    /* Hacer el fondo oscuro (overlay) más transparente y suave */
.uk-offcanvas-overlay::before {
    background: rgba(0, 0, 0, 0.15) !important; /* Un velo negro muy suave */
    backdrop-filter: blur(2px); /* Agrega un pequeño desenfoque premium */
}

/* Ajuste fino de la barra lateral */
.uk-offcanvas-bar {
    width: 220px !important; /* Un poco más ancho que 200px para que los textos no se corten */
    background: #ffffff !important; /* Fondo blanco puro para contraste */
    color: #333 !important; /* Texto oscuro */
    padding: 40px 20px;
    box-shadow: -5px 0 20px rgba(0,0,0,0.05); /* Sombra muy suave hacia la izquierda */
}

/* Color de los iconos y enlaces dentro del menú móvil */
.uk-offcanvas-bar .uk-nav-default > li > a {
    color: #000000 !important;
    font-size: 0.8rem;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0; /* Línea divisoria muy tenue */
}

/* Botón de cerrar del menú móvil */
.uk-offcanvas-close {
    color: #000 !important;
    top: 15px;
    right: 15px;
}
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit-icons.min.js"></script>

<nav style="display: flex; align-items: center; justify-content: space-between; padding: 0px 20px; min-height: 65px; background: backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;">
    
    <div style="display: flex; align-items: center;">
        <a href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/image/logo-smr-blanco.svg' | relative_url }}" alt="SMR" style="height: 80px; width: auto;">
        </a>
    </div>

    <div class="uk-visible@m" style="display: flex; align-items: center;">
        {%- for item in include.menu -%}
            <a href="{{ item.url | relative_url }}" style="color: white; margin-left: 20px; text-decoration: none; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center;">
                {%- if item.icon -%}<span uk-icon="icon: {{ item.icon }}; ratio: 0.8" style="margin-right: 8px;"></span>{%- endif -%}
                {{ item.title }}
            </a>
        {%- endfor -%}
    </div>

    <a class="uk-hidden@m" uk-toggle="target: #menu-movil" style="color: white; padding: 10px;">
        <span uk-icon="icon: menu; ratio: 1.2"></span>
    </a>
</nav>

<div id="menu-movil" uk-offcanvas="flip: true; overlay: true">
    <div class="uk-offcanvas-bar" style="background: #111; display: flex; flex-column: column;">
        <button class="uk-offcanvas-close" type="button" uk-close></button>
        
        <ul class="uk-nav uk-nav-default uk-margin-auto-vertical">
            {% for item in site.navigation %}
                <li class="{% if page.url == item.url %}uk-active{% endif %}">
                    <a href="{{ item.url | relative_url }}">
                        <span class="uk-margin-small-right" uk-icon="icon: {{ item.icon }}; ratio: 0.9"></span>
                        {{ item.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
