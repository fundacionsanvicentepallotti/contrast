<style>
/* Ajuste del ancho del menú lateral (offcanvas) */
.uk-offcanvas-bar {
    width: 200px !important; /* Puedes cambiar 200px por el ancho que prefieras */
}

/* Asegurar que el menú se desplace correctamente desde fuera de la pantalla */
.uk-offcanvas-flip .uk-offcanvas-bar {
    right: -200px;
}

:not(.uk-offcanvas-flip) > .uk-offcanvas-bar {
    left: -200px;
}

/* Ajuste de los textos dentro del menú móvil */
.uk-offcanvas-bar .uk-nav-default > li > a {
    font-size: 0.85rem;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 1px;
}

</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.13/dist/js/uikit-icons.min.js"></script>

<div style="display: flex; align-items: center; justify-content: flex-start; background: #2d2d34; padding: 10px 20px; width: 100%;">
    
    <div style="margin-right: 30px;"> 
        <a href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/image/logo-smr-blanco.svg' | relative_url }}" alt="SMR" style="height: 78px; width: auto; display: block;">
        </a>
    </div>

    <nav style="display: flex; align-items: center;">
        <div class="uk-visible@m" style="display: flex; align-items: center;">
            {%- for item in include.menu -%}
                <a href="{{ item.url | relative_url }}" style="color: white; margin-right: 8px; text-decoration: none; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; display: flex; align-items: center; white-space: nowrap;">
                    {%- if item.icon -%}
                        <span uk-icon="icon: {{ item.icon }}; ratio: 0.9" style="margin-right: 5px;"></span>
                    {%- endif -%}
                    {{ item.title }}
                </a>
            {%- endfor -%}
        </div>

        <a class="uk-hidden@m" uk-toggle="target: #menu-movil" style="color: white; padding: 10px;">
            <span uk-icon="icon: menu; ratio: 1.2"></span>
        </a>
    </nav>
</div>


<div id="menu-movil" uk-offcanvas="flip: true; overlay: true">
    <div class="uk-offcanvas-bar" style="background: #111; display: flex; flex-column: column;">
        <button class="uk-offcanvas-close" type="button" uk-close></button>
        
        <ul class="uk-nav uk-nav-default uk-margin-large-top">
            <li class="uk-nav-header" style="color: #b59410; letter-spacing: 2px;">MENÚ</li>
            <li class="uk-nav-divider"></li>
            {%- for item in include.menu -%}
            <li>
                <a href="{{ item.url | relative_url }}" style="color: white; font-size: 15px; padding: 12px 0; display: flex; align-items: center;">
                    {%- if item.icon -%}<span uk-icon="icon: {{ item.icon }}" class="uk-margin-right"></span>{%- endif -%}
                    {{ item.title }}
                </a>
            </li>
            {%- endfor -%}
        </ul>
    </div>
</div>
